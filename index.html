<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siraj Wear</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #fff;
    color: #111;
}

/* NAV */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    border-bottom: 1px solid #eee;
}

.logo {
    font-size: 24px;
    font-weight: 600;
}

.cart-btn {
    cursor: pointer;
}

/* PRODUCTS */
.products {
    padding: 50px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
}

.product {
    border: 1px solid #eee;
    padding: 20px;
    text-align: center;
}

.product h3 {
    margin-bottom: 10px;
}

.product button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #111;
    color: #fff;
    border: none;
    cursor: pointer;
}

/* CART */
.cart {
    position: fixed;
    right: -400px;
    top: 0;
    width: 350px;
    height: 100%;
    background: #fff;
    box-shadow: -5px 0 15px rgba(0,0,0,0.1);
    padding: 20px;
    transition: 0.3s;
}

.cart.active {
    right: 0;
}

.cart h2 {
    margin-bottom: 20px;
}

.cart-item {
    margin-bottom: 10px;
}

.total {
    margin-top: 20px;
    font-weight: bold;
}

.close-cart {
    cursor: pointer;
    margin-bottom: 20px;
    display: block;
}
</style>
</head>

<body>

<header>
    <div class="logo">Siraj Wear</div>
    <div class="cart-btn" onclick="toggleCart()">🛒 Cart</div>
</header>

<section class="products">
    <div class="product">
        <h3>White Thobe</h3>
        <p>€39.99</p>
        <button onclick="addToCart('White Thobe', 39.99)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Black Thobe</h3>
        <p>€44.99</p>
        <button onclick="addToCart('Black Thobe', 44.99)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Oud Perfume</h3>
        <p>€29.99</p>
        <button onclick="addToCart('Oud Perfume', 29.99)">Add to Cart</button>
    </div>
</section>

<div class="cart" id="cart">
    <span class="close-cart" onclick="toggleCart()">✖ Close</span>
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <div class="total" id="total">Total: €0</div>
</div>

<script>
let cart = [];

function toggleCart() {
    document.getElementById("cart").classList.toggle("active");
}

function addToCart(name, price) {
    cart.push({name, price});
    renderCart();
}

function renderCart() {
    let cartItems = document.getElementById("cart-items");
    let total = 0;

    cartItems.innerHTML = "";

    cart.forEach(item => {
        let div = document.createElement("div");
        div.classList.add("cart-item");
        div.innerText = item.name + " - €" + item.price;
        cartItems.appendChild(div);
        total += item.price;
    });

    document.getElementById("total").innerText = "Total: €" + total.toFixed(2);
}
</script>

</body>
</html>
